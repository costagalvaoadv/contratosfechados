// ── Converte dd/mm/aaaa → yyyy-mm-dd ──
function toISO(str) {
  if (!str || !str.trim()) return '';
  str = str.trim();
  // já está em ISO
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  // dd/mm/aaaa ou d/m/aaaa
  const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return ''; // não reconhecido (ex: "Agosto")
}

// ── Normaliza status ──
function normStatus(s) {
  if (!s || s.trim() === '--------------' || s.trim() === '') return 'EM ANDAMENTO';
  return s.trim().toUpperCase();
}

// ── Normaliza origem ──
function normOrigem(s) {
  if (!s) return '';
  const v = s.trim();
  if (/facebook/i.test(v)) return 'Tráfego Facebook';
  if (/instagram/i.test(v)) return 'Instagram Orgânico';

  if (/indica/i.test(v))   return 'Indicação Cliente';
  if (/google/i.test(v))   return 'Google Ads';
  return v;
}

// expõe função globalmente
window.iniciarImportacao = async function() {
  const btn  = document.getElementById('btnImportar');
  const log  = document.getElementById('log');
  const bar  = document.getElementById('progressBar');
  const summ = document.getElementById('summary');

  btn.disabled = true;
  btn.textContent = 'Importando…';
  log.style.display = 'block';
  log.innerHTML = '';

  let ok = 0, erros = 0;
  const total = DADOS.length;

  for (let i = 0; i < total; i++) {
    const r = DADOS[i];
    const nome = r[1].trim();
    if (!nome) continue;

    const dataFechamento = toISO(r[0]);
    const dataContrato   = toISO(r[3]);
    const tempo          = r[4] ? parseInt(r[4]) : (calcDias(dataFechamento, dataContrato));

    const doc = {
      dataFechamento,
      nomeCliente:        nome,
      telefone:           r[2].trim(),
      dataContrato,
      tempoFechamento:    isNaN(tempo) ? '' : tempo,
      previsaoNascimento: toISO(r[5]),
      origem:             normOrigem(r[6]),
      closer:             r[7].trim(),
      demanda:            r[8].trim(),
      status:             normStatus(r[9]),
      local:              r[10].trim(),
      protocolo:          r[11].trim(),
      observacoes:        r[12].trim(),
      criadoEm:           serverTimestamp(),
      atualizadoEm:       serverTimestamp(),
    };

    try {
      await addDoc(collection(db, 'contratos'), doc);
      ok++;
      log.innerHTML += `<span class="ok">✓ ${nome}</span>\n`;
    } catch(e) {
      erros++;
      log.innerHTML += `<span class="er">✗ ERRO em ${nome}: ${e.message}</span>\n`;
    }

    // atualiza barra
    bar.style.width = ((i+1)/total*100) + '%';
    log.scrollTop = log.scrollHeight;
    summ.textContent = `${i+1} de ${total} processados — ${ok} importados, ${erros} erros`;

    // pequena pausa para não sobrecarregar o Firestore
    await sleep(120);
  }

  btn.textContent = '✓ Concluído';
  summ.textContent = `Importação finalizada! ${ok} contratos importados com sucesso. ${erros > 0 ? erros + ' erros.' : ''}`;

  // importar equipe também
  await importarEquipe();
};

async function importarEquipe() {
  const equipe = ['Jucineide','Isabel','Joelma','Denise','Larissa','Lauana','Leticia'];
  const logEl  = document.getElementById('log');
  logEl.innerHTML += '\n<span class="in">── Importando equipe ──</span>\n';
  for (const nome of equipe) {
    try {
      await addDoc(collection(db, 'equipe'), { nome, ativo: true, criadoEm: serverTimestamp() });
      logEl.innerHTML += `<span class="ok">✓ Equipe: ${nome}</span>\n`;
    } catch(e) {
      logEl.innerHTML += `<span class="er">✗ Erro equipe ${nome}: ${e.message}</span>\n`;
    }
    await sleep(100);
  }
  logEl.innerHTML += '<span class="in">✓ Tudo importado! Pode fechar esta aba.</span>\n';
  logEl.scrollTop = logEl.scrollHeight;
}

function calcDias(d1, d2) {
  if (!d1 || !d2) return '';
  return Math.round((new Date(d2) - new Date(d1)) / 86400000);
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
